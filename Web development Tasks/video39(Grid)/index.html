<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Practice</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }

        .child {
            height: 50px;
            width: 52px;
            background-color: antiquewhite;
            margin: 5px;
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </main>
</body>
</html>
